<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0e12"/>
      <stop offset="100%" stop-color="#07080a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.12" r="0.5">
      <stop offset="0%" stop-color="rgba(0,229,153,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,229,153,0)"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0 H0 V56" fill="none" stroke="#1d2127" stroke-width="1"/>
    </pattern>
    <radialGradient id="gridmask" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridfade">
      <rect width="1200" height="630" fill="url(#gridmask)"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gridfade)" opacity="0.6"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo + brand -->
  <g transform="translate(80, 80)">
    <path
      d="M4 24 16 6l12 18M4 24h24M9 24v-6h14v6"
      fill="none"
      stroke="#00e599"
      stroke-width="2.6"
      stroke-linecap="round"
      stroke-linejoin="round"
      transform="scale(1.4)"
    />
    <text x="60" y="34" font-family="'Geist', system-ui, sans-serif" font-size="28" font-weight="600" fill="#e7eaef" letter-spacing="-0.02em">
      Hangar
    </text>
    <text x="158" y="32" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#6b7280" letter-spacing="0.12em" text-transform="uppercase">
      CONTROL TOWER
    </text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 240)">
    <text font-family="'Bricolage Grotesque', 'Geist', system-ui, sans-serif" font-size="84" font-weight="700" fill="#e7eaef" letter-spacing="-0.04em">
      <tspan x="0" y="0">Every dev tool you ship with.</tspan>
      <tspan x="0" y="100" fill="#a8aeb8">One quiet hangar.</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(80, 480)">
    <text font-family="'Geist', system-ui, sans-serif" font-size="22" fill="#a8aeb8" letter-spacing="-0.005em">
      Pin your stack. Vault your tokens. Watch what's broken.
    </text>
    <text y="36" font-family="'Geist', system-ui, sans-serif" font-size="22" fill="#6b7280" letter-spacing="-0.005em">
      Local-first. Open source. No accounts.
    </text>
  </g>

  <!-- URL stamp bottom-right -->
  <g transform="translate(80, 564)">
    <rect width="10" height="10" rx="2" fill="#00e599"/>
    <text x="22" y="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" fill="#a8aeb8" letter-spacing="0.06em">
      hangar-silk.vercel.app
    </text>
  </g>
</svg>
